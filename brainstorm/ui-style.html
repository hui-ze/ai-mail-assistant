<h2>界面设计风格选择</h2>
<p class="subtitle">选择一个符合你审美的设计方向</p>

<div class="options">
  <div class="option" data-choice="minimalist" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简约现代</h3>
      <p>大量留白，扁平化设计，清晰的视觉层次，专业感强</p>
    </div>
  </div>
  
  <div class="option" data-choice="professional" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>专业商务</h3>
      <p>类似Outlook/企业软件风格，功能密集，信息量大，适合深度用户</p>
    </div>
  </div>
  
  <div class="option" data-choice="friendly" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>友好亲和</h3>
      <p>圆润的边角，柔和的配色，渐进式引导，适合普通用户</p>
    </div>
  </div>
</div>
