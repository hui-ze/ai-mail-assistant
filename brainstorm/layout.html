<h2>主界面布局方案</h2>
<p class="subtitle">选择应用的整体布局结构</p>

<div class="options">
  <div class="option" data-choice="three-panel" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>三栏布局</h3>
      <p>左侧：邮件列表 / 中间：邮件摘要详情 / 右侧：待办事项面板。类似主流邮件客户端，信息丰富，一屏看全。</p>
      <div style="margin-top:12px; display:flex; gap:6px; height:70px;">
        <div style="width:25%; background:#e8eaf6; border-radius:6px; display:flex;align-items:center;justify-content:center;font-size:11px;color:#667eea;">邮件列表</div>
        <div style="width:45%; background:#f3e5f5; border-radius:6px; display:flex;align-items:center;justify-content:center;font-size:11px;color:#9c27b0;">摘要详情</div>
        <div style="width:30%; background:#e8f5e9; border-radius:6px; display:flex;align-items:center;justify-content:center;font-size:11px;color:#4caf50;">待办面板</div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="two-panel" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>双栏布局</h3>
      <p>左侧：邮件列表 + 摘要 / 右侧：待办事项。更简洁，焦点集中，适合日常快速处理。</p>
      <div style="margin-top:12px; display:flex; gap:6px; height:70px;">
        <div style="width:55%; background:#e8eaf6; border-radius:6px; display:flex;align-items:center;justify-content:center;font-size:11px;color:#667eea;">邮件列表 + 摘要</div>
        <div style="width:45%; background:#e8f5e9; border-radius:6px; display:flex;align-items:center;justify-content:center;font-size:11px;color:#4caf50;">待办事项</div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="tab-based" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>标签页布局</h3>
      <p>顶部标签切换：邮件摘要 / 待办事项 / 设置。界面最简洁，适合小屏幕，功能分区明确。</p>
      <div style="margin-top:12px; height:70px;">
        <div style="display:flex; gap:4px; margin-bottom:6px;">
          <div style="padding:4px 12px; background:#667eea; color:white; border-radius:6px; font-size:11px;">邮件摘要</div>
          <div style="padding:4px 12px; background:#eee; border-radius:6px; font-size:11px; color:#666;">待办事项</div>
          <div style="padding:4px 12px; background:#eee; border-radius:6px; font-size:11px; color:#666;">设置</div>
        </div>
        <div style="background:#f5f5f5; border-radius:6px; height:40px; display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;">当前标签内容区域</div>
      </div>
    </div>
  </div>
</div>
